# ============================================
# Configuração do Snort — IDS SIRS RedVector
# ============================================

# Rede a proteger: rede corporate (16.2.4.0/24)
# O HOME_NET define qual é a rede que o Snort está a monitorizar.
# Todos os alertas que usem "$HOME_NET" nas regras referem-se a esta rede.
var HOME_NET 16.2.4.0/24

# Tudo o que NÃO é HOME_NET é considerado rede externa
var EXTERNAL_NET !$HOME_NET

# Caminho onde estão os ficheiros de regras
var RULE_PATH /etc/snort/rules

# ============================================
# OPÇÃO OBRIGATÓRIA: desativar verificação de checksums
# ============================================
# Em ambientes virtualizados (Docker/Kathará), os checksums TCP/IP
# dos pacotes são frequentemente incorretos porque o kernel do host
# faz offloading de checksum (calcula os checksums na placa de rede
# física, não no software). Dentro dos containers, os pacotes circulam
# com checksums inválidos.
#
# Sem esta opção, o Snort descartaria TODOS estes pacotes por terem
# "bad checksum" e não geraria NENHUM alerta.
#
# Fonte: Enunciado page_5.png — "é preciso dar à opção config
# checksum_mode o valor none"
# Referência: Snort Users Manual [3], secção "Preprocessor Config"
config checksum_mode: none

# ============================================
# Incluir ficheiro de regras locais (onde estão as NOSSAS regras)
# ============================================
# O Snort vem com centenas de regras pré-definidas, mas nós só queremos
# as nossas. Este include aponta para o ficheiro local.rules.
include $RULE_PATH/local.rules